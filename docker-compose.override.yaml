# Build from local source instead of pulling from registry.
# Remove this file to go back to pre-built images.

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    environment:
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
